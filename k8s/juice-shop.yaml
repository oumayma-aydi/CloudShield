apiVersion: v1
kind: Namespace
metadata:
  name: juice-shop
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: juice-shop-sa
  namespace: juice-shop
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: juice-shop-deployment
  namespace: juice-shop
  labels:
    app: juice-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: juice-shop
  template:
    metadata:
      labels:
        app: juice-shop
    spec:
      serviceAccountName: juice-shop-sa
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
containers:
      - name: juice-shop
        image: bkimminich/juice-shop:latest
        # ... (keep your ports and resources) ...
        securityContext:
          runAsNonRoot: true        # Prevents the app from running as the 'Root' admin user
          runAsUser: 1000           # Explicitly sets a standard user ID
          allowPrivilegeEscalation: false # Prevents the app from gaining more power after starting
          capabilities:
            drop:
              - ALL                 # Removes all Linux kernel powers except the bare minimum
---
apiVersion: v1
kind: Service
metadata:
  name: juice-shop-service
  namespace: juice-shop
spec:
  selector:
    app: juice-shop
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: NodePort
---
# checkov:skip=CKV2_K8S_6: "NetworkPolicy - isolated DAST target"
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: juice-shop-allow-all
  namespace: juice-shop
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - {}
  egress:
  - {}
