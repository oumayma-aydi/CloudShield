apiVersion: apps/v1
kind: Deployment
metadata:
  name: juice-shop-deployment
  # checkov:skip=CKV_K8S_21: "Risk Accepted: Using default namespace for local lab"
  labels:
    app: juice-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: juice-shop
  template:
    metadata:
      labels:
        app: juice-shop
    spec:
      automountServiceAccountToken: false
      # FIX: Pod-level security context to restrict kernel calls
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: juice-shop
        # checkov:skip=CKV_K8S_14: "Risk Accepted: Using latest tag for dynamic testing"
        # checkov:skip=CKV_K8S_43: "Risk Accepted: Image digest not required for lab"
        # checkov:skip=CKV_K8S_22: "Risk Accepted: Juice shop needs write access"
        # checkov:skip=CKV_K8S_8: "Risk Accepted: Liveness probe omitted"
        # checkov:skip=CKV_K8S_9: "Risk Accepted: Readiness probe omitted"
        # checkov:skip=CKV2_K8S_6: "Risk Accepted: NetworkPolicies omitted"
        image: bkimminich/juice-shop:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          runAsUser: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: juice-shop-service
  # checkov:skip=CKV_K8S_21: "Risk Accepted: Using default namespace for local lab"
spec:
  selector:
    app: juice-shop
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: NodePort
