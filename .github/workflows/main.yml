name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # INDEPENDENT JOB: Semgrep SAST
  # Runs alone - does not wait for others
  # ─────────────────────────────────────────────
  semgrep-sast:
    name: "Semgrep SAST Scan"
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Run Semgrep SAST
        run: |
          semgrep scan --config auto --json --output semgrep-report.json || true

      - name: Upload Semgrep Report
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        if: always()
        with:
          name: semgrep-report
          path: semgrep-report.json
          retention-days: 30

  # ─────────────────────────────────────────────
  # INDEPENDENT JOB: Syft SBOM
  # Runs alone - satisfies EO 14028 compliance
  # ─────────────────────────────────────────────
  syft-sbom:
    name: "Syft SBOM Generation"
    runs-on: self-hosted
    steps:
      - name: Pull Juice Shop Image
        run: docker pull bkimminich/juice-shop:latest

      - name: Generate SBOM with Syft
        run: |
          syft bkimminich/juice-shop:latest -o cyclonedx-json=sbom.json

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: juice-shop-sbom
          path: sbom.json

  # ─────────────────────────────────────────────
  # MAIN CHAIN: Stage 1 · Infrastructure Scan
  # ─────────────────────────────────────────────
  security-scan:
    name: "Stage 1 · Checkov SAST"
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Run Checkov Security Scan
        run: |
          checkov -d . --output json --output-file-path . || true
          find . -name "results_*.json" -exec cp {} checkov-report.json \; 2>/dev/null || true

      - name: Upload Checkov Report
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        if: always()
        with:
          name: checkov-report
          path: checkov-report.json

  # ─────────────────────────────────────────────
  # MAIN CHAIN: Stage 2 · Container Scan
  # ─────────────────────────────────────────────
  container-security:
    name: "Stage 2 · Trivy Scan"
    runs-on: self-hosted
    needs: security-scan
    steps:
      - name: Pull Juice Shop Image
        run: docker pull bkimminich/juice-shop:latest

      - name: Run Trivy Vulnerability Scanner
        run: |
          trivy image --format json --output trivy-report.json --severity HIGH,CRITICAL --exit-code 0 bkimminich/juice-shop:latest

      - name: Upload Trivy Report
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        if: always()
        with:
          name: trivy-report
          path: trivy-report.json

  # ─────────────────────────────────────────────
  # MAIN CHAIN: Stage 3 · Deployment
  # ─────────────────────────────────────────────
app-deploy:
    name: "Stage 3 · Deploy to Kubernetes"
    runs-on: self-hosted
    needs: container-security
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Ensure Kind cluster is running
        run: |
          if ! kind get clusters 2>/dev/null | grep -q "cloudshield-cluster"; then
            echo "Cluster not found — recreating..."
            kind create cluster --name cloudshield-cluster
          else
            echo "Cluster exists — checking API server..."
            kubectl cluster-info || (
              echo "API unreachable — deleting and recreating cluster..."
              kind delete cluster --name cloudshield-cluster
              kind create cluster --name cloudshield-cluster
            )
          fi
          kubectl get nodes

      - name: Deploy Juice Shop to Kind Cluster
        run: kubectl apply -f k8s/juice-shop.yaml --validate=false

      - name: Wait for pod to be ready
        run: |
          kubectl wait --for=condition=ready pod \
            -l app=juice-shop \
            -n juice-shop \
            --timeout=120s || kubectl get pods -n juice-shop -o wide

  # ─────────────────────────────────────────────
  # MAIN CHAIN: Stage 4 · Infrastructure
  # ─────────────────────────────────────────────
  infrastructure-deploy:
    name: "Stage 4 · Terraform Apply"
    runs-on: self-hosted
    needs: app-deploy
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Start LocalStack
        run: |
          docker ps | grep localstack || docker run --rm -d -p 4566:4566 -p 4510-4559:4510-4559 --name localstack localstack/localstack
          sleep 10

      - name: Terraform Deploy
        run: |
          terraform init
          terraform destroy -auto-approve || true
          terraform apply -auto-approve
