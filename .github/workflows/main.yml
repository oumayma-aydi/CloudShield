name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # STAGE 1: SAST - Checkov & Semgrep
  # ─────────────────────────────────────────────
  security-scan:
    name: "Stage 1 · Checkov & Semgrep SAST"
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Run Checkov Security Scan
        run: |
          checkov -d . --output json --output-file-path . || true
          find . -name "results_*.json" -exec cp {} checkov-report.json \; 2>/dev/null || true

      - name: Run Semgrep SAST
        # Scans source code for OWASP patterns
        run: |
          semgrep scan --config auto --json --output semgrep-report.json || true

      - name: Upload SAST Reports
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        if: always()
        with:
          name: sast-reports
          path: |
            checkov-report.json
            semgrep-report.json
          retention-days: 30

  # ─────────────────────────────────────────────
  # STAGE 2: Container Scan & SBOM (Syft)
  # ─────────────────────────────────────────────
  container-security:
    name: "Stage 2 · Trivy & Syft SBOM"
    runs-on: self-hosted
    needs: security-scan
    steps:
      - name: Pull Juice Shop Image
        run: docker pull bkimminich/juice-shop:latest

      - name: Run Trivy Vulnerability Scanner
        run: |
          trivy image --format json --output trivy-report.json --severity HIGH,CRITICAL --exit-code 0 bkimminich/juice-shop:latest

      - name: Generate SBOM with Syft
        # Creates the CycloneDX inventory required by your schema
        run: |
          syft bkimminich/juice-shop:latest -o cyclonedx-json=sbom.json

      - name: Upload Container Reports
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        if: always()
        with:
          name: container-reports
          path: |
            trivy-report.json
            sbom.json

  # ─────────────────────────────────────────────
  # STAGE 3: Deploy to Kubernetes
  # ─────────────────────────────────────────────
  app-deploy:
    name: "Stage 3 · Deploy to Kubernetes"
    runs-on: self-hosted
    needs: container-security
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Deploy Juice Shop
        run: kubectl apply -f k8s/juice-shop.yaml

      - name: Wait for pod
        run: |
          kubectl wait --for=condition=ready pod -l app=juice-shop --timeout=120s || kubectl get pods

  # ─────────────────────────────────────────────
  # STAGE 4: Infrastructure (LocalStack)
  # ─────────────────────────────────────────────
  infrastructure-deploy:
    name: "Stage 4 · Terraform Apply"
    runs-on: self-hosted
    needs: app-deploy
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Start LocalStack
        run: |
          docker ps | grep localstack || docker run --rm -d -p 4566:4566 -p 4510-4559:4510-4559 --name localstack localstack/localstack
          sleep 10

      - name: Terraform Deploy
        run: |
          terraform init
          terraform destroy -auto-approve || true
          terraform apply -auto-approve
