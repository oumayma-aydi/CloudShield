name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

# SECURITY FIX: Explicitly restrict pipeline permissions
permissions:
  contents: read

jobs:
  security-scan:
    name: Checkov SAST Scan
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Checkov Security Scan
        run: checkov -d .
